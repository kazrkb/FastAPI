<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    {% if title %}
      <title>FastAPI Blog - {{ title }}</title>
    {% else %}
      <title>FastAPI Blog</title>
    {% endif %}
    <meta name="description" content="FastAPI Tutorial">
    <meta name="author" content="Corey Schafer">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', path='css/main.css') }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar">
        <div class="container navbar-container">
          <div class="nav-left">
            <a class="navbar-brand" href="{{ url_for('home') }}">FastAPI Blog</a>
            <a class="nav-link" href="{{ url_for('home') }}">Home</a>
          </div>
          <div class="nav-right">
            <a class="nav-link" href="#">Login</a>
            <a class="nav-link" href="#">Register</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="container main-container">
      <div class="content-wrapper">
        <div class="main-content">
          {% block content %}
          {% endblock content %}
        </div>
        
        <aside class="sidebar">
          <div class="content-section">
            <h3>Our Sidebar</h3>
            <p class="text-muted">You can put any information here you'd like.</p>
            <ul class="list-group">
              <li><a href="#">Latest Posts</a></li>
              <li><a href="#">Announcements</a></li>
              <li><a href="#">Calendars</a></li>
              <li><a href="#">etc</a></li>
            </ul>
          </div>
        </aside>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container text-center">
        <p class="text-muted mb-0">
          © <span id="year"></span> Learning FastAPI
        </p>
      </div>
    </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </body>
</html>
