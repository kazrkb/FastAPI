{% extends "layout.html" %}
{% block content %}
    <div class="grid gap-4">
        {% for post in posts %}
            <article class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm shadow-slate-900/5 transition hover:-translate-y-0.5 hover:shadow-lg hover:shadow-slate-900/10 dark:border-slate-800 dark:bg-slate-900/70 dark:shadow-black/20 sm:p-6">
                <div class="flex items-start gap-4 sm:gap-5">
                    <img class="h-14 w-14 flex-shrink-0 rounded-full border border-slate-200 object-cover shadow-sm shadow-slate-900/10 dark:border-slate-700 sm:h-16 sm:w-16"
                         src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=128&q=80"
                         alt="{{ post.author }}'s profile picture"
                         width="64"
                         height="64"
                         loading="lazy">

                    <div class="min-w-0 flex-1">
                        <div class="mb-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
                            <a class="font-semibold text-cyan-700 transition hover:text-cyan-600 dark:text-cyan-300 dark:hover:text-cyan-200" href="#">{{ post.author }}</a>
                            <span class="text-slate-400 dark:text-slate-500">•</span>
                            <small class="text-slate-500 dark:text-slate-400">{{ post.date_posted }}</small>
                        </div>

                        <h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white sm:text-2xl">
                            <a class="transition hover:text-cyan-700 dark:hover:text-cyan-300" href="#">{{ post.title }}</a>
                        </h2>

                        <p class="mt-3 text-sm leading-7 text-slate-600 dark:text-slate-300 sm:text-base">{{ post.content }}</p>
                    </div>
                </div>
            </article>
        {% endfor %}
    </div>
{% endblock content %}
